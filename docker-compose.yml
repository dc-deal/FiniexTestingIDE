services:
  finiex-dev:
    build: .
    container_name: finiex-testing-ide
    volumes:
      - .:/app # Dein Code
      - ./data:/app/data # Daten-Ordner
      # Git Konfiguration vom Host übernehmen
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.ssh:/root/.ssh:ro # SSH Keys für Git
    environment:
      - PYTHONPATH=/app
    stdin_open: true # Für interaktive Shell
    tty: true # Für interaktive Shell
    command: |
      bash -c "
        # Container am Leben halten
        tail -f /dev/null
      "